# =============================================================================
# Macau POS — Production Docker Compose
# Usage: docker compose -f docker-compose.production.yml up -d
# =============================================================================

services:
  # ---------- Database ----------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-pos_prod}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.production}
      POSTGRES_DB: ${DB_NAME:-macau_pos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No host port mapping — apps connect via Docker network
    # System postgres keeps 5432 on host for direct access
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pos_prod}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Admin App ----------
  admin:
    build:
      context: .
      args:
        APP: admin
        PORT: "3100"
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-pos_prod}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-macau_pos}
      - AUTH_SECRET=${AUTH_SECRET:?Set AUTH_SECRET in .env.production}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy

  # ---------- Cashier App ----------
  cashier:
    build:
      context: .
      args:
        APP: cashier
        PORT: "3200"
        BUILD_ID: ${BUILD_ID:-dev}
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-pos_prod}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-macau_pos}
      - AUTH_SECRET=${AUTH_SECRET}
      - NODE_ENV=production
      - GDS_REFRESH_TOKEN=${GDS_REFRESH_TOKEN:-}
      - RAKUTEN_APP_ID=${RAKUTEN_APP_ID:-}
      - YAHOO_JP_APP_ID=${YAHOO_JP_APP_ID:-}
    depends_on:
      postgres:
        condition: service_healthy

  # ---------- Storefront App ----------
  storefront:
    build:
      context: .
      args:
        APP: storefront
        PORT: "3300"
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-pos_prod}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-macau_pos}
      - AUTH_SECRET=${AUTH_SECRET}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy

  # ---------- Nginx + Certbot ----------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "5174:5174"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
      - cashier-products:/data/cashier-products:ro
    depends_on:
      - admin
      - cashier
      - storefront

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Renew certs every 12 hours (only acts if near expiry)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

volumes:
  pgdata:
  certbot-webroot:
  certbot-certs:
  cashier-products:
