# =============================================================================
# Legacy services — proxied to host processes via host.docker.internal
# =============================================================================

# ---------- dev.intellipay.io ----------
server {
    listen 80;
    server_name dev.intellipay.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dev.intellipay.io;

    ssl_certificate     /etc/nginx/ssl/star_intellipay_io/crt/STAR_intellipay_io-bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/star_intellipay_io/.private/star_intellipay_io.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /checkout {
        proxy_pass         http://host.docker.internal:3850;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location /checkout/_next/static/ {
        proxy_pass         http://host.docker.internal:3850;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://host.docker.internal:1337;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ---------- event.intellipay.io ----------
server {
    listen 80;
    server_name event.intellipay.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name event.intellipay.io;

    ssl_certificate     /etc/nginx/ssl/star_intellipay_io/crt/STAR_intellipay_io-bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/star_intellipay_io/.private/star_intellipay_io.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    location /admin {
        return 403;
    }

    location /checkout {
        proxy_pass         http://host.docker.internal:3850;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location /checkout/_next/static/ {
        proxy_pass         http://host.docker.internal:3850;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://host.docker.internal:1337;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ---------- event.intellipay.io MQueue dashboard (port 5174) ----------
server {
    listen 5174 ssl;
    server_name event.intellipay.io;

    ssl_certificate     /etc/nginx/ssl/star_intellipay_io/crt/STAR_intellipay_io-bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/star_intellipay_io/.private/star_intellipay_io.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    location /api/ {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, X-Queue-Secret, X-Internal-Secret" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://host.docker.internal:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /health {
        proxy_pass http://host.docker.internal:3100;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://host.docker.internal:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

