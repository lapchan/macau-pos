# ---------- hkretailai.com / www (retailos-simulator) ----------
server {
    listen 443 ssl;
    server_name hkretailai.com www.hkretailai.com;

    ssl_certificate     /etc/letsencrypt/live/admin.hkretailai.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.hkretailai.com-0001/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    location /_next/static/ {
        proxy_pass http://host.docker.internal:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
