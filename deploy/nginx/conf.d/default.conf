# =============================================================================
# Macau POS — Nginx config
# Domain: hkretailai.com
# =============================================================================

# ---------- Redirect HTTP → HTTPS ----------
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- Admin ----------
server {
    listen 443 ssl;
    server_name admin.hkretailai.com;

    ssl_certificate     /etc/letsencrypt/live/admin.hkretailai.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.hkretailai.com-0001/privkey.pem;

    location / {
        proxy_pass http://admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------- Cashier (POS) ----------
server {
    listen 443 ssl;
    server_name pos.hkretailai.com;

    ssl_certificate     /etc/letsencrypt/live/admin.hkretailai.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.hkretailai.com-0001/privkey.pem;

    # Serve product images directly from persistent storage (survives rebuilds)
    location /products/ {
        alias /data/cashier-products/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri @cashier;
    }

    location @cashier {
        proxy_pass http://cashier;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://cashier;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------- Storefront: tenant subdomains ----------
# Matches *.store.hkretailai.com (e.g. mybrand.store.hkretailai.com)
server {
    listen 443 ssl;
    server_name *.store.hkretailai.com store.hkretailai.com;

    ssl_certificate     /etc/letsencrypt/live/admin.hkretailai.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.hkretailai.com-0001/privkey.pem;

    location / {
        proxy_pass http://storefront;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------- Storefront: custom domains ----------
# Each tenant's custom domain gets its own server block via add-domain.sh
# Files are auto-generated at deploy/nginx/conf.d/custom-domains/*.conf
include /etc/nginx/conf.d/custom-domains/*.conf;

